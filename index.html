<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Идём в кино афиша</title>
    <!-- Bootstrap CSS (сетка и базовые стили) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Ваши стили -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="page-body">
<header class="page-header">
    <div class="container header-container">
        <a href="index.html" class="logo">
            <img src="static/img/logo.svg" alt="Идём в кино">
        </a>
        <a href="admin.html" class="btn btn-login">ВОЙТИ</a>
    </div>
</header>

<main class="main-content">
    <div class="container">
        <!-- Календарь -->
        <div class="calendar">
            <button class="calendar__arrow calendar__arrow--prev">←</button>
            <div class="calendar__days">
                <div class="calendar__day calendar__day--today">
                    <span class="day-name">пн</span>
                    <span class="day-number">10</span>
                    <span class="day-today">Сегодня</span>
                </div>
                <div class="calendar__day">
                    <span class="day-name">вт</span>
                    <span class="day-number">11</span>
                </div>
                <!-- ... остальные дни -->
            </div>
            <button class="calendar__arrow calendar__arrow--next">→</button>
        </div>

        <!-- Список фильмов -->
        <div class="movies-list">
            <article class="movie-card bg-beige-transparent">
                <div class="movie-card__left">
                    <img class="movie-card__poster" src="static/img/poster1.jpg" alt="Постер">
                    <div class="movie-card__halls">
                        <div class="movie-card__hall">
                            <span class="hall-name">Зал №1:</span>
                            <div class="session-times">
                                <span class="session-time">10:00</span>
                                <span class="session-time">12:30</span>
                                <span class="session-time">15:00</span>
                            </div>
                        </div>
                        <div class="movie-card__hall">
                            <span class="hall-name">Зал №2:</span>
                            <div class="session-times">
                                <span class="session-time">11:20</span>
                                <span class="session-time">13:50</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="movie-card__right">
                    <h2 class="movie-card__title">Название фильма</h2>
                    <p class="movie-card__description">Описание фильма, которое может быть довольно длинным и занимать несколько строк.</p>
                    <p class="movie-card__duration">120 мин, США</p>
                </div>
            </article>
            <!-- ещё карточки -->
        </div>
    </div>
</main>
<!-- Bootstrap JS (для бургера и модалок, если понадобятся) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Ваши скрипты -->
<script src="static/js/api.js"></script>
<script src="static/js/client.js"></script>
</body>
</html>
