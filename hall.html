<main class="main-content">
    <div class="container hall-container">
        <div class="hall-info text-center">
            <h1 class="hall-info__title">Название фильма</h1>
            <p class="hall-info__time">18:30</p>
            <p class="hall-info__hall">Зал №1</p>
        </div>
        <div class="hall-scheme">
            <!-- Здесь будет схема мест (пока заглушка) -->
            <div class="hall-scheme__row">
                <div class="hall-scheme__place hall-scheme__place--standard"></div>
                <div class="hall-scheme__place hall-scheme__place--standard"></div>
                <div class="hall-scheme__place hall-scheme__place--vip"></div>
                <!-- ... остальные места -->
            </div>
            <div class="hall-scheme__row">
                <!-- ещё ряд -->
            </div>
            <!-- Легенда -->
            <div class="hall-legend">
                <span class="legend-item"><span class="legend-color legend-color--standard"></span> Свободно</span>
                <span class="legend-item"><span class="legend-color legend-color--vip"></span> VIP</span>
                <span class="legend-item"><span class="legend-color legend-color--taken"></span> Занято</span>
                <span class="legend-item"><span class="legend-color legend-color--selected"></span> Выбрано</span>
            </div>
        </div>
        <div class="text-center mt-4">
            <button class="btn btn-primary btn-booking" disabled>ЗАБРОНИРОВАТЬ</button>
        </div>
    </div>
</main>
