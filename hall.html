<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Идём в кино схема зала</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/client.js"></script>
</head>

<body class="page-body">

<header class="page-header">
    <div class="container header-container">
        <a href="index.html" class="logo">
            <img src="static/img/logo.svg" alt="Идём в кино">
        </a>
    </div>
</header>

<main class="main-content">
    <div class="container hall-container bg-beige-transparent">
        <div class="hall-info">
            <h1 class="hall-info__title">Название фильма</h1>
            <p class="hall-info__time">Время сеанса: 18:30</p>
            <p class="hall-info__hall">Зал №1</p>
        </div>
    <!-- Схема зала -->
    <div class="hall">
        <div class="hall-screen">экран</div>
        <div class="hall-scheme">
            <!-- схема мест -->
        </div>
        <div class="hall-legend">
            <div class="legend-item">
                <span class="legend-color legend-color--standard"></span>
                Свободно (<span class="legend-price-standard">0</span> руб)
            </div>
            <div class="legend-item">
                <span class="legend-color legend-color--taken"></span>
                Занято
            </div>
            <div class="legend-item">
                <span class="legend-color legend-color--vip"></span>
                VIP (<span class="legend-price-vip">0</span> руб)
            </div>
            <div class="legend-item">
                <span class="legend-color legend-color--selected"></span>
                Выбрано
            </div>
        </div>
    </div>

        <div class="text-center">
            <button class="btn btn-booking">ЗАБРОНИРОВАТЬ</button>
        </div>
    </div>
</main>
</body>
</html>
