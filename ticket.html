<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Идём в кино билет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/qr-creator/dist/qr-creator.min.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/client.js"></script>
</head>

<body class="page-body">

<header class="page-header">
    <div class="container d-flex justify-content-between align-items-start">
        <a href="index.html" class="logo">
            <img src="static/img/logo.svg" alt="Идём в кино">
        </a>
    </div>
</header>

<main class="main-content">
    <div class="container ticket-container">
        <div class="ticket-card bg-beige-transparent">
            <h2 class="ticket-card__title">ЭЛЕКТРОННЫЙ БИЛЕТ</h2>
            <hr class="ticket-card__divider">
            <div class="ticket-card__details">
                <p><span class="detail-label">На фильм:</span> <span class="detail-value" id="film-name">Название фильма</span></p>
                <p><span class="detail-label">Места:</span> <span class="detail-value" id="selected-seats">5 ряд, 12 место</span></p>
                <p><span class="detail-label">В зале:</span> <span class="detail-value" id="hall-name">Зал №1</span></p>
                <p><span class="detail-label">Начало сеанса:</span> <span class="detail-value" id="start-time">18:30</span></p>
            </div>
            <div class="ticket-card__qr">
                <!-- Здесь будет QR-код -->
                <div class="qr-placeholder">QR-код</div>
            </div>
            <p class="ticket-card__footnote">
                Покажите QR-код нашему контроллеру для подтверждения бронирования.
            </p>
            <p class="ticket-card__wish">Приятного просмотра!</p>
        </div>
    </div>
</main>
</body>
</html>
