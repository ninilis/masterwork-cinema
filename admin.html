<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Идём в кино</title>
    <!-- Bootstrap CSS (сетка и базовые стили) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Ваши стили -->
    <link rel="stylesheet" href="static/css/styleAdmin.css">
</head>
<body class="page-body-admin">
<header class="page-header">
    <div class="container d-flex justify-content-between align-items-start">
        <a href="index.html" class="logo">
            <img src="static/img/logo.svg" alt="Идём в кино">
        </a>
        <!-- Здесь можно добавить информацию об администраторе и кнопку выхода -->
    </div>
</header>

<main class="main-content">
    <div class="container">
        <!-- Вкладки (табы) для переключения разделов -->
        <ul class="nav nav-tabs" id="adminTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="halls-tab" data-bs-toggle="tab" data-bs-target="#halls" type="button" role="tab">Залы</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="films-tab" data-bs-toggle="tab" data-bs-target="#films" type="button" role="tab">Фильмы</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="schedule-tab" data-bs-toggle="tab" data-bs-target="#schedule" type="button" role="tab">Сетка сеансов</button>
            </li>
        </ul>

        <!-- Содержимое вкладок -->
        <div class="tab-content" id="adminTabsContent">
            <!-- Вкладка Залы -->
            <div class="tab-pane fade show active" id="halls" role="tabpanel">
                <div class="mt-4">
                    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addHallModal">+ Создать зал</button>
                    <div id="halls-list" class="row">
                        <!-- Здесь будут карточки залов, заполняемые через JS -->
                    </div>
                </div>
            </div>

            <!-- Вкладка Фильмы -->
            <div class="tab-pane fade" id="films" role="tabpanel">
                <div class="mt-4">
                    <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addFilmModal">+ Добавить фильм</button>
                    <div id="films-list" class="row">
                        <!-- Карточки фильмов -->
                    </div>
                </div>
            </div>

            <!-- Вкладка Сетка сеансов -->
            <div class="tab-pane fade" id="schedule" role="tabpanel">
                <div class="mt-4">
                    <p>Здесь будет реализован drag & drop для создания и удаления сеансов.</p>
                    <div class="schedule-container">
                        <!-- Список фильмов (перетаскиваемые элементы) -->
                        <div class="films-pool">
                            <h5>Фильмы</h5>
                            <div id="films-pool-list" class="d-flex flex-wrap gap-2">
                                <!-- элементы фильмов с data-id -->
                            </div>
                        </div>
                        <!-- Временные ленты залов -->
                        <div id="halls-timelines" class="mt-4">
                            <!-- для каждого зала своя временная шкала -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Модальные окна -->
<!-- Добавление зала -->
<div class="modal fade" id="addHallModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Новый зал</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addHallForm">
                    <div class="mb-3">
                        <label for="hallName" class="form-label">Название зала</label>
                        <input type="text" class="form-control" id="hallName" required>
                    </div>
                    <div class="row">
                        <div class="col">
                            <label for="hallRows" class="form-label">Рядов</label>
                            <input type="number" class="form-control" id="hallRows" min="1" value="5">
                        </div>
                        <div class="col">
                            <label for="hallCols" class="form-label">Мест в ряду</label>
                            <input type="number" class="form-control" id="hallCols" min="1" value="8">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="saveHallBtn">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<!-- Добавление фильма -->
<div class="modal fade" id="addFilmModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Добавить фильм</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addFilmForm">
                    <div class="mb-3">
                        <label for="filmName" class="form-label">Название</label>
                        <input type="text" class="form-control" id="filmName" required>
                    </div>
                    <div class="mb-3">
                        <label for="filmDuration" class="form-label">Длительность (мин)</label>
                        <input type="number" class="form-control" id="filmDuration" required>
                    </div>
                    <div class="mb-3">
                        <label for="filmDescription" class="form-label">Описание</label>
                        <textarea class="form-control" id="filmDescription" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="filmOrigin" class="form-label">Страна</label>
                        <input type="text" class="form-control" id="filmOrigin">
                    </div>
                    <div class="mb-3">
                        <label for="filmPoster" class="form-label">Постер (png)</label>
                        <input type="file" class="form-control" id="filmPoster" accept=".png">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" id="saveFilmBtn">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<!-- Модалка для редактирования схемы зала (будет открываться из карточки зала) -->
<div class="modal fade" id="editHallSchemeModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Редактирование схемы зала <span id="editingHallName"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="hall-scheme-editor" class="hall-scheme-editor">
                    <!-- Здесь будет сетка мест для редактирования -->
                </div>
                <div class="mt-3">
                    <button class="btn btn-success" id="saveSchemeBtn">Сохранить схему</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- SortableJS для drag & drop -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<!-- Ваши скрипты -->
<script src="static/js/api.js"></script>
<script src="static/js/admin.js"></script>
</body>
</html>
