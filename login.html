<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Администратор · Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/styleAdmin.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/admin.js"></script>
</head>
<body class="page-body-admin">
<header class="page-header">
    <div class="container d-flex flex-column">
        <a href="index.html" class="logo">
            <img src="static/img/logo.svg" alt="Идём в кино">
        </a>
        <img src="static/img/Администраторррская.svg" alt="Администраторррская" class="admin-subtitle">
    </div>
</header>

<main class="main-content">
    <div class="container d-flex justify-content-center">
        <div class="login-card">
            <div class="login-card__header">АВТОРИЗАЦИЯ</div>
            <div class="login-card__body">
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="loginEmail" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="ninilis@domain.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">АВТОРИЗОВАТЬСЯ</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
