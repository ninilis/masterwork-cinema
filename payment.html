<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Идём в кино оплата</title>
    <!-- Bootstrap CSS (сетка и базовые стили) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Ваши стили -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="page-body">
<header class="page-header">
    <div class="container d-flex justify-content-between align-items-start">
        <a href="index.html" class="logo">
            <img src="static/img/logo.svg" alt="Идём в кино">
        </a>
        <!-- Кнопка "Войти" будет только на главной (index) -->
    </div>
</header>
<main class="main-content">
    <div class="container payment-container">
        <div class="payment-card bg-beige-transparent">
            <h2 class="payment-card__title">ВЫ ВЫБРАЛИ БИЛЕТ</h2>
            <hr class="payment-card__divider">
            <div class="payment-card__details">
                <p><span class="detail-label">Фильм:</span> <span class="detail-value" id="film-name">Название фильма</span></p>
                <p><span class="detail-label">Места:</span> <span class="detail-value" id="selected-seats">5 ряд, 12 место</span></p>
                <p><span class="detail-label">Зал:</span> <span class="detail-value" id="hall-name">Зал №1</span></p>
                <p><span class="detail-label">Начало сеанса:</span> <span class="detail-value" id="start-time">18:30</span></p>
                <p><span class="detail-label">Стоимость:</span> <span class="detail-value" id="total-price">350 ₽</span></p>
            </div>
            <div class="text-center">
                <button class="btn btn-code">ПОЛУЧИТЬ КОД БРОНИРОВАНИЯ</button>
            </div>
            <p class="payment-card__footnote">
                После оплаты билет будет доступен в этом окне, а также придёт вам на почту. Покажите QR-код нашему контролёру у входа в зал.
            </p>
            <p class="payment-card__wish">Приятного просмотра!</p>
        </div>
    </div>
</main>
<!-- Bootstrap JS (для бургера и модалок, если понадобятся) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Ваши скрипты -->
<script src="static/js/client.js"></script>
</body>
</html>
